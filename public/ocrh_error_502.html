<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta
            http-equiv="refresh"
            content="10" />
        <meta
            name="theme-color"
            content="#fff8e1" />
        <title>Open CRH Tracker 正在更新</title>
        <link
            rel="icon"
            href="/favicon.ico" />
        <style>
            @font-face {
                font-family: 'Inter';
                src: url('/fonts/curated/inter/Inter-SemiBold.woff2') format('woff2');
                font-weight: 600;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'Source Han Sans SC Subset';
                src: url('/fonts/curated/source-han-sans-sc/SourceHanSansSC-Subset-Regular.b0917a8892c4.woff2') format('woff2');
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: 'Source Han Sans SC Subset';
                src: url('/fonts/curated/source-han-sans-sc/SourceHanSansSC-Subset-Medium.03f229b9f59f.woff2') format('woff2');
                font-weight: 500;
                font-style: normal;
                font-display: swap;
            }

            :root {
                --crh-blue: #00529b;
                --crh-ink: #334155;
                --crh-slate: #f8fafc;
                --font-sans: 'Inter', 'Source Han Sans SC Subset', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            html {
                background: var(--crh-slate);
                font-family: var(--font-sans);
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, rgba(0, 82, 155, 0.12), transparent 34%),
                    linear-gradient(180deg, #f8fbff 0%, #f8fafc 100%);
                color: var(--crh-ink);
            }

            main {
                text-align: center;
            }

            h1 {
                margin: 0 0 16px;
                color: var(--crh-blue);
                font-size: clamp(32px, 5vw, 52px);
                font-weight: 600;
                letter-spacing: -0.04em;
            }

            p {
                margin: 0;
                font-size: clamp(18px, 2vw, 24px);
                line-height: 1.8;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Open CRH Tracker</h1>
            <p>网站正在更新，请稍等片刻</p>
        </main>
    </body>
</html>
